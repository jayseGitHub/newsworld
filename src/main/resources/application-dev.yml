spring:
  datasource:
    url: jdbc:h2:./data/newsworld-dev;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  main:
    lazy-initialization: true

  liquibase:
    enabled: true

  h2:
    console:
      enabled: true
      path: /h2-console

newsworld:
  collector:
    bypass-time-check: true
    schedule:
      cron: "0 */1 * * * *"

logging:
  level:
    io.newsworld: DEBUG
